# ─────────────────────────────────────────────────────────────
# Download Music — Docker Compose (Local Pro — $0 Infrastructure)
# ─────────────────────────────────────────────────────────────
# Services: api (Rust/Axum), worker (Rust), redis, nginx
#
# Usage:
#   docker-compose up -d            # Start all services
#   docker-compose up -d --build    # Rebuild and start
#   docker-compose logs -f worker   # Follow worker logs
#   docker-compose down             # Stop all services
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Redis: Cache + Queue (Redis Streams) + PubSub ──
  redis:
    image: redis:7-alpine
    container_name: dm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API: Rust/Axum HTTP Server ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: dm-api
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:4322,http://localhost:3100,http://localhost:8080
      - STORAGE_PATH=/data/audio
      - YTDLP_PATH=yt-dlp
      - FFMPEG_PATH=ffmpeg
      - JOB_TTL_SECONDS=3600
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=analizar_links=debug
      - RATE_LIMIT_RPS=10
    volumes:
      - audio-data:/data/audio
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Worker: Background Job Processor ──
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: dm-worker
    restart: unless-stopped
    environment:
      - STORAGE_PATH=/data/audio
      - YTDLP_PATH=yt-dlp
      - FFMPEG_PATH=ffmpeg
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=analizar_links=debug
      - WORKER_CONCURRENCY=4
    volumes:
      - audio-data:/data/audio
    depends_on:
      redis:
        condition: service_healthy
    # No port exposed — worker is internal

  # ── NGINX: Static File Serving (sendfile) ──
  nginx:
    image: nginx:alpine
    container_name: dm-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - audio-data:/data/audio:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
    driver: local
  audio-data:
    driver: local
