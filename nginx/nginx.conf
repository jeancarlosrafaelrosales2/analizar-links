# ─────────────────────────────────────────────────────────────
# NGINX Configuration — Download Music Audio File Server
# ─────────────────────────────────────────────────────────────
# Purpose: Serve audio files via sendfile (zero-copy) so the
# Rust API doesn't waste threads on file I/O.
#
# Anti-Pattern AP-3: "NEVER serve audio files from Rust in production"
# ─────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # ── Gzip (not for audio, but for JSON/HTML) ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=download:10m rate=5r/s;

    server {
        listen 80;
        server_name _;

        # ── Health Check ──
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-audio"}';
            add_header Content-Type application/json;
        }

        # ── Audio File Serving ──
        # Maps to: GET /audio/{filename}
        # Files stored at: /data/audio/
        location /audio/ {
            alias /data/audio/;

            # Rate limit downloads
            limit_req zone=download burst=10 nodelay;

            # CORS headers
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;

            # Cache headers
            add_header Cache-Control "public, max-age=3600, immutable";
            add_header X-Content-Type-Options "nosniff" always;

            # Support range requests (for seeking in audio players)
            add_header Accept-Ranges bytes;

            # Content disposition — force download
            if ($request_uri ~* "\.mp3$") {
                add_header Content-Type "audio/mpeg";
            }
            if ($request_uri ~* "\.m4a$") {
                add_header Content-Type "audio/mp4";
            }
            if ($request_uri ~* "\.ogg$") {
                add_header Content-Type "audio/ogg";
            }
            if ($request_uri ~* "\.flac$") {
                add_header Content-Type "audio/flac";
            }
            if ($request_uri ~* "\.webm$") {
                add_header Content-Type "audio/webm";
            }

            # Enable sendfile for zero-copy file transfer
            sendfile on;
            tcp_nopush on;

            # Max file size (500MB should be more than enough)
            client_max_body_size 0;

            # Disable buffering for large files
            proxy_buffering off;

            # Custom 404
            try_files $uri =404;
        }

        # ── Proxy to API (optional — for unified endpoint) ──
        location /api/ {
            proxy_pass http://api:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # ── Deny everything else ──
        location / {
            return 404 '{"error":"Not found"}';
            add_header Content-Type application/json;
        }
    }
}
