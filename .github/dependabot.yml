version: 2
updates:
  - package-ecosystem: 'cargo'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'rust']
    groups:
      axum:
        patterns: ['axum*', 'tower*']
      serde:
        patterns: ['serde*']
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels: ['ci', 'automated']
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels: ['docker', 'automated']
